<h1>📝 fonts_thumbnail_ea@1.5x.png.bin 繁體中文產生器</h1>

<div class="info">
  此工具會產生繁體中文版的字型縮圖二進位檔案。<br>
  每個字型名稱會以該字型本身渲染在 450×42 的 Canvas 上，然後 RLE 壓縮成 OnlyOffice 的 .bin 格式。<br>
  <strong>注意：</strong>你的電腦必須安裝對應的字型（如等線、微軟雅黑、宋體等），縮圖才會正確顯示。

// =====================================================
// Sprite parameters
// =====================================================
const SPRITE_WIDTH = 450;
const SPRITE_HEIGHT_ONE = 42;
const FONT_COUNT = FONTS_INFOS.length; // 219

// Font rendering parameters
const FONT_SIZE = 26;       // px at 1.5x scale
const TEXT_LEFT = 10;        // left padding
const TEXT_BASELINE_Y = 30;  // baseline Y position (vertically centered in 42px)

// =====================================================
// Get display name for a font (Traditional Chinese if CJK)
// =====================================================
function getDisplayName(englishName) {
  const simplified = Ddb[englishName];
  if (simplified) {
    const traditional = sc2tc[simplified];
    return traditional || simplified;
  }
  return englishName;
}

// =====================================================
// Get the CSS font-family to use for rendering
// For CJK fonts, use the English name (which maps to the actual system font)
// =====================================================
function getFontFamily(englishName) {
  // Use the English font name for CSS, browsers map it to the actual font
  return '"' + englishName + '", "Microsoft JhengHei", sans-serif';
}

// =====================================================
// Render a single font thumbnail
// =====================================================
function renderThumbnail(englishName, canvas, ctx) {
  const displayName = getDisplayName(englishName);
  const fontFamily = getFontFamily(englishName);

  // Clear canvas (transparent)
  ctx.clearRect(0, 0, SPRITE_WIDTH, SPRITE_HEIGHT_ONE);

  // Set font and draw text
  ctx.fillStyle = '#000000';
  ctx.textBaseline = 'alphabetic';
  ctx.font = FONT_SIZE + 'px ' + fontFamily;
  ctx.fillText(displayName, TEXT_LEFT, TEXT_BASELINE_Y);

  return displayName;
}

// =====================================================
// Extract alpha channel from canvas ImageData → byte array
// =====================================================
function extractAlphaChannel(ctx) {
  const imageData = ctx.getImageData(0, 0, SPRITE_WIDTH, SPRITE_HEIGHT_ONE);
  const data = imageData.data;
  const totalPixels = SPRITE_WIDTH * SPRITE_HEIGHT_ONE;
  const alpha = new Uint8Array(totalPixels);
  for (let i = 0; i < totalPixels; i++) {
    alpha[i] = data[i * 4 + 3]; // Alpha channel
  }
  return alpha;
}

// =====================================================
// RLE encode all font tiles into the binary format
// Format: header (12 bytes) + RLE body
// Header: width(4B BE) + heightOne(4B BE) + count(4B BE)
// Body: byte=0,N → N transparent pixels; byte=V(V>0) → 1 pixel with A=V
// =====================================================
function rleEncode(allAlphas) {
  // Estimate output size (worst case: every pixel is non-zero = 1 byte per pixel)
  const totalPixels = SPRITE_WIDTH * SPRITE_HEIGHT_ONE * FONT_COUNT;
  const buffer = new Uint8Array(12 + totalPixels * 2); // generous buffer
  let pos = 0;

  // Write header (Big Endian uint32)
  function writeUint32BE(val) {
    buffer[pos++] = (val >> 24) & 0xFF;
    buffer[pos++] = (val >> 16) & 0xFF;
    buffer[pos++] = (val >> 8) & 0xFF;
    buffer[pos++] = val & 0xFF;
  }

  writeUint32BE(SPRITE_WIDTH);     // width = 450
  writeUint32BE(SPRITE_HEIGHT_ONE); // heightOne = 42
  writeUint32BE(FONT_COUNT);        // count = 219

  // Encode all tiles sequentially
  for (let fontIdx = 0; fontIdx < FONT_COUNT; fontIdx++) {
    const alpha = allAlphas[fontIdx];
    let i = 0;
    while (i < alpha.length) {
      if (alpha[i] === 0) {
        // Count consecutive transparent pixels (max 255 per run)
        let count = 0;
        while (i < alpha.length && alpha[i] === 0 && count < 255) {
          count++;
          i++;
        }
        buffer[pos++] = 0;     // marker: transparent run
        buffer[pos++] = count; // count
      } else {
        buffer[pos++] = alpha[i]; // non-zero alpha byte
        i++;
      }
    }
  }

  // Return trimmed result
  return buffer.slice(0, pos);
}

// =====================================================
// Generated binary data (stored after generation)
// =====================================================
let generatedBinary = null;

// =====================================================
// Main generate function
// =====================================================
async function generate() {
  const btnGen = document.getElementById('btnGenerate');
  const btnDl = document.getElementById('btnDownload');
  const btnPrev = document.getElementById('btnPreview');
  const statusEl = document.getElementById('status');

  btnGen.disabled = true;
  btnDl.disabled = true;
  btnPrev.disabled = true;
  statusEl.innerHTML = '⏳ 正在產生縮圖...';

  // Create offscreen canvas
  const canvas = document.createElement('canvas');
  canvas.width = SPRITE_WIDTH;
  canvas.height = SPRITE_HEIGHT_ONE;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  const allAlphas = [];
  const results = [];
  const missingFonts = [];

  // Small delay to let UI update
  await new Promise(r => setTimeout(r, 50));

  for (let i = 0; i < FONT_COUNT; i++) {
    const englishName = FONTS_INFOS[i];
    const displayName = renderThumbnail(englishName, canvas, ctx);
    const alpha = extractAlphaChannel(ctx);
    allAlphas.push(alpha);

    // Check if font is available by measuring text width
    // (heuristic: if the font falls back to default, the metrics might differ)
    const testCtx = canvas.getContext('2d');
    testCtx.font = FONT_SIZE + 'px "' + englishName + '"';
    const w1 = testCtx.measureText(displayName).width;
    testCtx.font = FONT_SIZE + 'px "____NONEXISTENT_FONT____"';
    const w2 = testCtx.measureText(displayName).width;
    const fontAvailable = Math.abs(w1 - w2) > 0.5;

    results.push({
      index: i,
      english: englishName,
      display: displayName,
      available: fontAvailable,
      hasPixels: alpha.some(v => v > 0),
    });

    if (!fontAvailable) missingFonts.push(englishName);

    // Update status periodically
    if (i % 20 === 0) {
      statusEl.innerHTML = `⏳ 正在產生縮圖... ${i + 1}/${FONT_COUNT}`;
      await new Promise(r => setTimeout(r, 0));
    }
  }

  statusEl.innerHTML = '⏳ 正在進行 RLE 壓縮...';
  await new Promise(r => setTimeout(r, 50));

  // RLE encode
  generatedBinary = rleEncode(allAlphas);

  // Show results
  let html = `<span class="ok">✅ 完成！</span> 產生了 ${FONT_COUNT} 個縮圖，二進位檔案大小：${generatedBinary.length.toLocaleString()} bytes<br>`;
  if (missingFonts.length > 0) {
    html += `<span class="warn">⚠️ ${missingFonts.length} 個字型可能未安裝（使用了備用字型渲染）：</span><br>`;
    html += `<small>${missingFonts.join(', ')}</small><br>`;
  }
  statusEl.innerHTML = html;

  // Store results for preview
  window._genResults = results;
  window._allAlphas = allAlphas;

  btnGen.disabled = false;
  btnDl.disabled = false;
  btnPrev.disabled = false;
}

// =====================================================
// Download the generated binary
// =====================================================
function downloadBin() {
  if (!generatedBinary) return;
  const blob = new Blob([generatedBinary], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fonts_thumbnail_ea@1.5x.png.bin';
  a.click();
  URL.revokeObjectURL(url);
}

// =====================================================
// Preview all thumbnails
// =====================================================
function togglePreview() {
  const previewEl = document.getElementById('preview');
  if (previewEl.style.display === 'none') {
    previewEl.style.display = 'block';
    previewEl.innerHTML = '';

    const canvas = document.createElement('canvas');
    canvas.width = SPRITE_WIDTH;
    canvas.height = SPRITE_HEIGHT_ONE;
    const ctx = canvas.getContext('2d');

    for (let i = 0; i < FONT_COUNT; i++) {
      const result = window._genResults[i];

      // Create a preview row
      const row = document.createElement('div');
      row.style.display = 'flex';
      row.style.alignItems = 'center';
      row.style.borderBottom = '1px solid #eee';
      row.style.padding = '2px 4px';
      row.style.fontSize = '11px';

      // Index label
      const label = document.createElement('span');
      label.style.width = '40px';
      label.style.flexShrink = '0';
      label.style.color = '#999';
      label.textContent = '#' + i;
      row.appendChild(label);

      // Rendered canvas preview
      const prevCanvas = document.createElement('canvas');
      prevCanvas.width = SPRITE_WIDTH;
      prevCanvas.height = SPRITE_HEIGHT_ONE;
      prevCanvas.style.width = '300px';
      prevCanvas.style.height = '28px';
      prevCanvas.style.border = '1px solid #ddd';
      prevCanvas.style.background = '#fff';
      const prevCtx = prevCanvas.getContext('2d');

      // Reconstruct from alpha data
      const alpha = window._allAlphas[i];
      const imageData = prevCtx.createImageData(SPRITE_WIDTH, SPRITE_HEIGHT_ONE);
      for (let p = 0; p < alpha.length; p++) {
        const v = alpha[p];
        imageData.data[p * 4]     = 255 - v; // R
        imageData.data[p * 4 + 1] = 255 - v; // G
        imageData.data[p * 4 + 2] = 255 - v; // B
        imageData.data[p * 4 + 3] = v;       // A
      }
      prevCtx.putImageData(imageData, 0, 0);
      row.appendChild(prevCanvas);

      // Font name info
      const info = document.createElement('span');
      info.style.marginLeft = '8px';
      info.style.flexShrink = '0';
      const availStr = result.available ? '✅' : '⚠️';
      info.innerHTML = `${availStr} <b>${result.english}</b> → ${result.display}`;
      row.appendChild(info);

      previewEl.appendChild(row);
    }
  } else {
    previewEl.style.display = 'none';
  }
}

// =====================================================
// Also provide a verification tool: decode existing .bin
// =====================================================
function verifyExisting() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.bin';
  input.onchange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const buffer = await file.arrayBuffer();
    const data = new Uint8Array(buffer);

    // Read header
    const width = (data[0] << 24) | (data[1] << 16) | (data[2] << 8) | data[3];
    const heightOne = (data[4] << 24) | (data[5] << 16) | (data[6] << 8) | data[7];
    const count = (data[8] << 24) | (data[9] << 16) | (data[10] << 8) | data[11];

    alert(`Binary info:\nWidth: ${width}\nHeightOne: ${heightOne}\nCount: ${count}\nFile size: ${data.length} bytes`);
  };
  input.click();
}
</script>
