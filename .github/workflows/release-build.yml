name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zip dist
        run: |
          cd dist
          zip -r versadesk-onlyoffice-word.zip versadesk-onlyoffice-word

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: versadesk-onlyoffice-word-dist
          path: dist/versadesk-onlyoffice-word.zip

      - name: Upload to Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/versadesk-onlyoffice-word.zip
